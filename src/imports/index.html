<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="GILDE — trusted home services in Stuttgart. Furniture assembly, small repairs, and home help." />
  <title>GILDE | Launching in Stuttgart</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>

<body>
  <!-- Poster card -->
  <div class="poster-frame">
    <!-- Crosshairs -->
    <div class="crosshairs top-left"></div>
    <div class="crosshairs top-right"></div>
    <div class="crosshairs bottom-left"></div>
    <div class="crosshairs bottom-right"></div>


    <div id="root"></div>
  </div>

  <script type="text/babel">
    const translations = {
      en: {
        hero_title: "GILDE — trusted home services in Stuttgart",
        hero_sub: "Stop wasting time searching — get reliable help for your home tasks",
        hero_services: ["Furniture assembly", "Small repairs", "Home help"],
        hero_email: "Email address",
        hero_zip: "ZIP code (optional)",
        hero_btn: "Get my discount",
        trust_1: "Local Stuttgart service",
        trust_2: "Verified professionals",
        trust_3: "No spam",

        use_cases_title: "What can GILDE help with?",
        use_cases: ["Assemble furniture", "Fix small problems at home", "Help with everyday household tasks"],

        how_title: "How it works",
        how_steps: [
          { id: 1, text: "Tell us what you need" },
          { id: 2, text: "We match you with a local professional" },
          { id: 3, text: "Get it done quickly and reliably" }
        ],

        about_title: "What is GILDE?",
        about_text: "GILDE connects you with trusted local professionals for everyday home tasks — without endless searching.",

        why_title: "Why choose GILDE",
        why_list: [
          "Local focus in Stuttgart",
          "Carefully selected professionals",
          "Simple and transparent process",
          "Built for real everyday needs"
        ],

        early_title: "Join early and get a first-booking discount",
        early_text: "Leave your email to be notified when GILDE launches and secure your discount.",

        dual_title: "GILDE for customers and professionals",
        dual_cust_title: "Need help at home?",
        dual_cust_text: "Join early and get notified when booking opens.",
        dual_cust_btn: "Find help",
        dual_pro_title: "Want to offer your services?",
        dual_pro_text: "Join GILDE as a local professional.",
        dual_pro_btn: "Offer services",

        final_title: "Need reliable help at home in Stuttgart?",
        final_text: "Join early and be the first to know when GILDE goes live.",
        final_btn: "Get my discount",

        success_msg: "You're on the list! We'll be in touch soon.",
        footer_contact: "Contact",
        footer_privacy: "Privacy Policy",
        footer_datenschutz: "Datenschutz",
        footer_impressum: "Impressum"
      },
      de: {
        hero_title: "GILDE — zuverlässige Dienste fürs Haus in Stuttgart",
        hero_sub: "Möbelmontage, kleine Reparaturen und Hilfe bei alltäglichen Aufgaben — einfach, lokal und zuverlässig.",
        hero_services: ["Möbelmontage", "Kleine Reparaturen", "Haushaltshilfe"],
        hero_email: "E-Mail-Adresse",
        hero_zip: "Postleitzahl (optional)",
        hero_btn: "Meinen Rabatt sichern",
        trust_1: "Lokaler Service in Stuttgart",
        trust_2: "Geprüfte Fachkräfte",
        trust_3: "Kein Spam",

        use_cases_title: "Wobei kann GILDE helfen?",
        use_cases: ["Möbel aufbauen", "Kleine Probleme zu Hause reparieren", "Hilfe bei alltäglichen Haushaltsaufgaben"],

        how_title: "Wie es funktioniert",
        how_steps: [
          { id: 1, text: "Teilen Sie uns mit, was Sie brauchen" },
          { id: 2, text: "Wir finden eine lokale Fachkraft für Sie" },
          { id: 3, text: "Schnell und zuverlässig erledigt" }
        ],

        about_title: "Was ist GILDE?",
        about_text: "GILDE verbindet Sie mit vertrauenswürdigen lokalen Fachkräften für Aufgaben im Haushalt — ohne endloses Suchen.",

        why_title: "Warum GILDE wählen",
        why_list: [
          "Lokaler Fokus in Stuttgart",
          "Sorgfältig ausgewählte Fachkräfte",
          "Einfacher und transparenter Prozess",
          "Gemacht für echte Alltagsbedürfnisse"
        ],

        early_title: "Frühzeitig teilnehmen und Rabatt sichern",
        early_text: "Hinterlassen Sie Ihre E-Mail, um beim Start von GILDE benachrichtigt zu werden und Ihren Rabatt zu sichern.",

        dual_title: "GILDE für Kunden und Fachkräfte",
        dual_cust_title: "Brauchen Sie Hilfe zu Hause?",
        dual_cust_text: "Frühzeitig teilnehmen und benachrichtigt werden, wenn Buchungen möglich sind.",
        dual_cust_btn: "Hilfe finden",
        dual_pro_title: "Möchten Sie Ihre Dienste anbieten?",
        dual_pro_text: "Treten Sie GILDE als lokale Fachkraft bei.",
        dual_pro_btn: "Dienste anbieten",

        final_title: "Brauchen Sie zuverlässige Hilfe zu Hause in Stuttgart?",
        final_text: "Frühzeitig teilnehmen und als Erster erfahren, wenn GILDE live geht.",
        final_btn: "Meinen Rabatt sichern",

        success_msg: "Sie stehen auf der Liste! Wir melden uns in Kürze bei Ihnen.",
        footer_contact: "Kontakt",
        footer_privacy: "Privacy Policy",
        footer_datenschutz: "Datenschutz",
        footer_impressum: "Impressum"
      }
    };

    const { useState, useRef } = React;

    /* Inline SVG icons */
    const IconPin = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />
      </svg>
    );
    const IconShield = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
    );
    const IconLock = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    );

    function App() {
      const [lang, setLang] = useState('en');
      const [isSubmitted, setIsSubmitted] = useState(false);
      const heroRef = useRef(null);
      const t = translations[lang];

      const handleSubmit = (e) => {
        e.preventDefault();
        setIsSubmitted(true);
      };

      const scrollToHero = () => {
        heroRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      const check = (text) => (
        <li style={{ display: 'flex', gap: '0.6rem', alignItems: 'flex-start', marginBottom: '0.65rem', fontSize: '1rem' }}>
          <span style={{ color: 'var(--color-brand-red)', fontWeight: 'bold', flexShrink: 0 }}>✓</span>
          <span>{text}</span>
        </li>
      );

      const arrow = (text) => (
        <li style={{ display: 'flex', gap: '0.6rem', alignItems: 'flex-start', marginBottom: '0.65rem', fontSize: '1rem' }}>
          <span style={{ color: 'var(--color-brand-red)', fontWeight: 'bold', flexShrink: 0 }}>→</span>
          <span>{text}</span>
        </li>
      );

      return (
        <>
          {/* ── STICKY HEADER ── */}
          <header className="top-bar">
            <div className="logo">GILDE</div>
            <div className="lang-switch">
              <button className={`btn-lang ${lang === 'en' ? 'active' : ''}`} onClick={() => setLang('en')}>EN</button>
              <button className={`btn-lang ${lang === 'de' ? 'active' : ''}`} onClick={() => setLang('de')}>DE</button>
            </div>
          </header>

          {/* ── HERO ── */}
          <section className="hero" ref={heroRef}>

            {/* Arch text SVG — decorative, like reference poster */}
            <div className="arch-text-wrap" style={{ display: 'none' }}>
              <svg viewBox="0 0 320 160" style={{ width: '100%', height: '100%' }}>
                <defs>
                  <path id="arch" d="M20,150 A140,140 0 0,1 300,150" />
                </defs>
                <text fill="none" stroke="var(--color-text-dark)" strokeWidth="0.3" fontSize="11" fontWeight="700" letterSpacing="4" fontFamily="Outfit, sans-serif" opacity="0.4" textAnchor="middle">
                  <textPath href="#arch" startOffset="50%">GILDE • STUTTGART • HOME SERVICES •</textPath>
                </text>
              </svg>
            </div>

            <h1 style={{ fontSize: 'clamp(2.2rem, 5.5vw, 4.2rem)', maxWidth: '820px', lineHeight: '1.05', marginBottom: '1.25rem' }}>
              {t.hero_title}
            </h1>

            <p style={{ fontSize: '1.15rem', marginBottom: '1.75rem', maxWidth: '620px', lineHeight: '1.65', opacity: '0.88' }}>
              {t.hero_sub}
            </p>

            {/* Service tags styled as keyboard keys */}
            <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '2rem' }}>
              {t.hero_services.map((srv, i) => (
                <div key={i} className="service-tag">
                  <span style={{ color: 'var(--color-brand-red)' }}>✓</span> {srv}
                </div>
              ))}
            </div>

            {/* ── FORM or SUCCESS ── */}
            {!isSubmitted ? (
              <form className="signup-form" onSubmit={handleSubmit}>
                <input type="email" className="input-field" placeholder={t.hero_email} required />
                <input type="text" className="input-field" placeholder={t.hero_zip} style={{ maxWidth: '170px' }} />
                <button type="submit" className="btn-primary">{t.hero_btn}</button>
              </form>
            ) : (
              <div style={{ padding: '1.25rem 2rem', background: 'var(--color-brand-red)', color: 'white', borderRadius: '6px', fontSize: '1.1rem', fontWeight: '700', maxWidth: '580px', marginBottom: '1.5rem', fontFamily: 'var(--font-display)' }}>
                ✓ {t.success_msg}
              </div>
            )}

            {/* Trust line with SVG icons */}
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.2rem 1.5rem', fontSize: '0.875rem', fontWeight: '600', marginTop: '0.5rem', color: 'var(--color-text-dark)', opacity: '0.75' }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}><IconPin /> {t.trust_1}</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}><IconShield /> {t.trust_2}</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: '0.4rem' }}><IconLock /> {t.trust_3}</span>
            </div>
          </section>

          {/* ── USE CASES + ABOUT ── */}
          <div className="sections-grid" style={{ marginBottom: '3rem' }}>
            <div className="content-block">
              <h2>{t.about_title}</h2>
              <p>{t.about_text}</p>
            </div>
            <div className="content-block">
              <h2>{t.use_cases_title}</h2>
              <ul style={{ listStyleType: 'none', paddingLeft: 0, marginTop: '0.5rem' }}>
                {t.use_cases.map((item, i) => check(item))}
              </ul>
            </div>
          </div>

          {/* ── HOW IT WORKS ── */}
          <div style={{ marginBottom: '3.5rem', padding: '2.5rem', background: 'rgba(255,255,255,0.3)', borderRadius: '10px', border: '1.5px solid rgba(26,31,140,0.2)' }}>
            <h2 style={{ textAlign: 'center', marginBottom: '2.5rem' }}>{t.how_title}</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px,1fr))', gap: '2rem', textAlign: 'center' }}>
              {t.how_steps.map(step => (
                <div key={step.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1rem' }}>
                  <div className="step-number">{step.id}</div>
                  <p style={{ fontWeight: '600', fontSize: '1rem', maxWidth: '180px', margin: 0, opacity: 1 }}>{step.text}</p>
                </div>
              ))}
            </div>
          </div>

          {/* ── WHY GILDE + EARLY ACCESS ── */}
          <div className="sections-grid" style={{ marginBottom: '3.5rem' }}>
            <div className="content-block">
              <h2>{t.why_title}</h2>
              <ul style={{ listStyleType: 'none', paddingLeft: 0, marginTop: '0.5rem' }}>
                {t.why_list.map((item, i) => arrow(item))}
              </ul>
            </div>
            <div className="content-block" style={{ background: 'rgba(255,0,51,0.06)', border: '1.5px dashed var(--color-brand-red)', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
              <h2>{t.early_title}</h2>
              <p style={{ margin: 0 }}>{t.early_text}</p>
            </div>
          </div>

          {/* ── DUAL AUDIENCE ── */}
          <div style={{ marginBottom: '3.5rem' }}>
            <h2 style={{ textAlign: 'center', marginBottom: '2rem' }}>{t.dual_title}</h2>
            <div className="sections-grid" style={{ marginBottom: 0 }}>
              <div className="content-block" style={{ display: 'flex', flexDirection: 'column', gap: '1.25rem', background: 'rgba(255,255,255,0.4)' }}>
                <h3 style={{ fontSize: '1.3rem' }}>{t.dual_cust_title}</h3>
                <p style={{ flex: 1, margin: 0 }}>{t.dual_cust_text}</p>
                <button onClick={scrollToHero} className="btn-primary" style={{ width: '100%' }}>{t.dual_cust_btn}</button>
              </div>
              <div className="content-block" style={{ display: 'flex', flexDirection: 'column', gap: '1.25rem' }}>
                <h3 style={{ fontSize: '1.3rem' }}>{t.dual_pro_title}</h3>
                <p style={{ flex: 1, margin: 0 }}>{t.dual_pro_text}</p>
                <button onClick={scrollToHero} className="btn-secondary" style={{ width: '100%' }}>{t.dual_pro_btn}</button>
              </div>
            </div>
          </div>

          {/* ── FINAL CTA ── */}
          <div style={{ textAlign: 'center', marginBottom: '4rem', padding: '3.5rem 2rem', background: 'rgba(255,0,51,0.07)', borderRadius: '10px', border: '1.5px solid var(--color-brand-red)' }}>
            <h2 style={{ margin: '0 0 1rem 0', fontSize: 'clamp(1.4rem, 3.5vw, 2rem)' }}>{t.final_title}</h2>
            <p style={{ margin: '0 auto 2.5rem auto', maxWidth: '500px', fontSize: '1.1rem' }}>{t.final_text}</p>
            {!isSubmitted && (
              <button onClick={scrollToHero} className="btn-primary" style={{ fontSize: '1.1rem', padding: '0 2.5rem', height: '56px' }}>{t.final_btn}</button>
            )}
          </div>

          {/* ── FOOTER ── */}
          <footer className="footer">
            <div>&copy; {new Date().getFullYear()} GILDE</div>
            <div className="footer-links">
              <a href="#">{t.footer_contact}</a>
              <a href="#">{t.footer_privacy}</a>
              <a href="#">{t.footer_datenschutz}</a>
              <a href="#">{t.footer_impressum}</a>
            </div>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
